    const auth = JSON.parse(localStorage.getItem('v318_booking_auth'));

// --- 🚀 V318 雲端抓取引擎：主副金鑰相容版 ---
async function pullFromCloud() {
    const auth = JSON.parse(localStorage.getItem('v318_booking_auth'));
    if (!auth || !auth.id) return;
    try {
        // 1. 先抓取該店家的數據
        const doc = await db.collection("Salons").doc(auth.id).get();
        if (doc.exists) {
            const cloudData = doc.data();
            
            // 🚀 關鍵安全檢查：去金鑰庫確認這把鑰匙是否還「活著」
            // 這樣就算妳換了店號的 syncCode，只要這把鑰匙沒被妳手動刪除或停用，員工就進得來
            const keyCheck = await db.collection("LicenseKeys_Booking").doc(auth.key).get();
            
           // 🚀 升級版門衛：檢查金鑰是否存在、是否被撤銷、是否過期
            const keyData = keyCheck.data();
            const now = new Date().getTime();

            if (!keyCheck.exists || keyData.status !== "used" || (keyData.expire && now > keyData.expire)) {
                
                // 定義錯誤訊息（根據不同原因顯示不同字）
                let errMsg = '您的授權已被撤銷，請聯繫店長重新獲取金鑰。';
                if (keyData.expire && now > keyData.expire) {
                    errMsg = '您的 30 天試用期已結束。請聯繫創作者購買正式版（LINE ID: 051873）。';
                }

                Swal.fire({
                    icon: 'error',
                    title: '授權失效',
                    text: errMsg,
                    confirmButtonColor: '#1d1d1f',
                    confirmButtonText: '確定',
                    allowOutsideClick: false
                }).then(() => {
                    localStorage.removeItem('v318_booking_auth');
                    location.reload(); 
                });
                return;
            }

            // 驗證通過，將雲端數據刷入手機
            store = cloudData;
            localStorage.setItem('SALON_LOCK_V318', JSON.stringify(store));
            updateStoreUI();
            initAll();
        }
    } catch (e) { 
        console.error("雲端載入失敗", e); 
    }
}

    function showP(id, index) {
    // 1. 【瞬發反應】：立即移動滑塊，不再等待
    const mover = document.getElementById('nav-aether-mover');
    if(mover && index !== undefined) {
        mover.style.transform = `translateX(${index * 100}%)`;
    }

    // 2. 立即點亮導航圖示 (反應時間從 100ms 降至 0ms)
    document.querySelectorAll('.nav-item').forEach((n, i) => {
        n.classList.toggle('active', i === index);
    });

    // 3. 立即切換分頁，不使用 setTimeout
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const pageEl = document.getElementById(id);
    if(pageEl) {
        pageEl.classList.add('active');
    }

    // 4. 背景安靜載入數據
    if(id.includes('res')) initMonth(); 
    else if(id==='pg-cli') { fillStySelect(); renderCli(); } 
    else if(id==='pg-set') renderSet(); 
    else if(id==='pg-stat') renderStats(); 
    else if(id==='pg-day') renderDay(curD.toLocaleDateString('sv'));

    // 5. 香皂滑動的微震回饋 (物理手感)
    if(window.navigator.vibrate) window.navigator.vibrate(10);
}

    function initMonth() {
        const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
        const pick = document.getElementById('m-picker').value ? new Date(document.getElementById('m-picker').value + "-01") : new Date();
        const year = pick.getFullYear(), month = pick.getMonth(), today = new Date().toLocaleDateString('sv');
        const days = new Date(year, month + 1, 0).getDate();
        let sDay = new Date(year, month, 1).getDay(); sDay = sDay === 0 ? 6 : sDay - 1;
        for(let i=0; i<sDay; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const el = document.createElement('div'); el.className = 'cal-day';
            if(ds === today) el.classList.add('today-highlight');
            if(store.offDays.includes(ds)) el.style.background = store.offColor;
            const dots = [...new Set(store.appointments.filter(a => a.date === ds).map(a => store.stylists.find(st => st.id == a.styId)?.color || '#ddd'))].map(c => `<div style="width:12px;height:12px;border-radius:50%;background:${c};display:inline-block;margin:3px;"></div>`).join('');
            el.innerHTML = `<div>${d}</div><div style="margin-top:10px;">${dots}</div>`;
            el.onclick = () => { curD = new Date(ds); showP('pg-day'); }; grid.appendChild(el);
        }
    }
    function goToday() { curD = new Date(); renderDay(curD.toLocaleDateString('sv')); showP('pg-day'); }
    function shiftDay(v) { curD.setDate(curD.getDate() + v); renderDay(curD.toLocaleDateString('sv')); }
    window.addEventListener('click', e => {
        document.querySelectorAll('.suggest-box').forEach(box => { if (!e.target.closest('input') && !e.target.closest('.suggest-box')) box.style.display = 'none'; });

        const auth = JSON.parse(localStorage.getItem('v318_booking_auth'));
        const isPro = auth && auth.id && auth.id !== "未綁定";

        // 如果不是 Pro 且預約已達 2 筆，攔截！
        if (!isPro && store.appointments.length >= 2 && !editId) {
            Swal.fire({ icon: 'lock', title: 'Aether Pro 專屬', text: '試用版預約上限為 2 筆，請聯繫管理員激活系統。', confirmButtonColor: '#1d1d1f' });
            return;
        }

        const data = { id: editId || String(Date.now()), n: res.n, sex: res.sex, p: res.p, c: res.c, styId: res.styId, price: res.price, note_full: res.note, date: res.d, time: res.t, tags: [...tempTags], done: apt ? apt.done : false, payTags: apt ? apt.payTags : [], isVIP: apt ? apt.isVIP : false };
        
        if (editId) {
            store.appointments = store.appointments.map(a => String(a.id) === String(editId) ? data : a);
        } else {
            store.appointments.push(data);
            if(res.saveCli) {
                // 🚀 如果不是 Pro 且顧客已達 2 位，不准自動加入名冊
                if (!isPro && store.clients.length >= 2 && !store.clients.find(c => c.n === res.n)) {
                    console.log("試用版顧客上限，跳過名冊更新");
                } else {
                    const exist = store.clients.find(c => c.n === res.n);
                    if(exist) { exist.p = res.p; exist.sex = res.sex; exist.lastSty = res.styId; }
                    else { store.clients.push({ n: res.n, p: res.p, sex: res.sex, lastSty: res.styId, bm:'', bd:'', note:'' }); }
                }
            }
        }
        await saveS(); 
        renderDay(res.d);
        if(document.getElementById('pg-cli').classList.contains('active')) renderCli();
    }
}

function renderDay(ds) {
    // 🚀 記憶空間：重畫前記住現在橫向滑動到哪裡
    const scrollContainer = document.getElementById('day-lanes');
    const scrollPos = scrollContainer ? scrollContainer.scrollLeft : 0; 

    const days = ['日','一','二','三','四','五','六'];
    const dayTitleEl = document.getElementById('day-title');
    if(dayTitleEl) dayTitleEl.innerText = `${ds} (週${days[new Date(ds).getDay()]})`; 
    const area = document.getElementById('day-lanes'); if(!area) return;
    area.innerHTML = '';
    const start = parseInt(store.startH || '11'), end = parseInt(store.endH || '19');
    const hours = []; for(let i=start; i<=end; i++) hours.push(`${i}:00`);

    store.stylists.forEach(s => {
        const lane = document.createElement('div'); lane.className = 'lane';
        lane.innerHTML = `<div style="text-align:center; font-weight:900; color:${s.color}; font-size:1.8rem; margin-bottom:20px;">${s.name}</div>`;
        hours.forEach(t => {
            const row = document.createElement('div'); row.className = 'time-row-space'; row.style.position = "relative";
            const matched = store.appointments.filter(a => a.date === ds && a.time.split(':')[0] === t.split(':')[0] && String(a.styId) === String(s.id));
            const label = `<div style="position:absolute; left:-45px; top:12px; font-size:0.75rem; color:#bbb; font-weight:900;">${t}</div>`;
            if(matched.length) {
                row.innerHTML = label + matched.map(a => {
                    const selectedTags = (a.payTags || []).map(tid => store.payTagsDef.find(pt => pt.id === tid)).filter(x => x);
                    return `<div class="apt-card ${a.done?'completed':''}" style="--c:${s.color}; margin-left:15px; width:calc(100% - 20px); padding:25px; border-radius:35px; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
                        <div class="tag-group" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px;" onclick="event.stopPropagation(); popTagPicker('${a.id}', '${ds}')">
                            <span style="font-size:1.3rem; display:flex; align-items:center;">
                                ${a.sex === 'M' ? '<i class="fas fa-mars" style="color:#007AFF;"></i>' : (a.sex === 'F' ? '<i class="fas fa-venus" style="color:#FF2D55;"></i>' : '')}
                            </span>
                            ${selectedTags.length > 0 ? selectedTags.map(pt => `<span class="tag-pill" style="background:${pt.color}; color:#fff; border-radius:12px; padding:5px 12px; font-size:0.8rem; font-weight:900;">${pt.name}</span>`).join('') : '<span class="tag-pill" style="background:#f2f2f7; color:#aaa; border-radius:12px; padding:5px 12px; font-size:0.8rem; font-weight:900;">+ 狀態</span>'}
                            <span class="tag-pill" style="border:1.5px solid var(--gold); color:${a.isVIP ? '#fff' : 'var(--gold)'}; background:${a.isVIP ? 'var(--gold)' : 'transparent'}; border-radius:12px; padding:5px 12px; font-size:0.8rem; font-weight:900;" onclick="event.stopPropagation(); toggleVIP('${a.id}','${ds}')">
                                ${a.isVIP ? '⭐ 指定' : '不指定'}
                            </span>
                        </div>

                        <div style="position:absolute; right:20px; top:20px; display:flex; gap:15px; align-items:center;">
                            <i class="fas fa-pen" style="color:#ccc; font-size:1.1rem; cursor:pointer;" onclick="event.stopPropagation(); popBooking('${a.n}','${a.p}','${a.styId}','${a.id}')"></i>
                            <i class="fas fa-trash-alt" style="color:rgba(255,0,0,0.15); font-size:1.1rem; cursor:pointer;" onclick="event.stopPropagation(); confirmDelApt('${a.id}','${ds}')"></i>

                        <div onclick="event.stopPropagation(); popPriceEdit('${a.id}', '${ds}')" 
                             style="display:inline-flex; align-items:center; gap:8px; background:rgba(212,175,55,0.08); padding:8px 18px; border-radius:18px; cursor:pointer; margin-bottom:15px; border:1px solid rgba(212,175,55,0.15);">
                            <span style="font-weight:900; color:var(--gold); font-size:1.2rem;">$ ${a.price || "補填金額"}</span>
                        </div>

                        <div style="background:rgba(0,0,0,0.02); padding:15px; border-radius:20px; border-left:5px solid var(--gold);">
                            <div style="font-weight:900; color:var(--gold); font-size:1rem; margin-bottom:5px;">✂️ ${(a.tags || []).join(' + ') || '服務項目'}</div>

        }); area.appendChild(lane);
    });
    // 🚀 空間還原：重畫完後，瞬間閃回原本滑動的位置
    if (scrollContainer) {
        requestAnimationFrame(() => {
            scrollContainer.scrollLeft = scrollPos;
        });
    }
}

function searchStored(el, boxId) {
    const val = el.value.trim(); const box = document.getElementById(boxId);
    if(!val) { box.style.display='none'; return; }
    const ms = store.clients.filter(c => (c.n||"").includes(val) || (c.p||"").includes(val));
    if(ms.length) { 
        box.style.display='block'; 
        box.innerHTML = ms.map(m => `<div class="suggest-item" style="padding:18px 25px; border-bottom:1px solid #f2f2f7; font-weight:800; cursor:pointer;" onclick="pickSug('${m.n}', '${m.p}', '${m.lastSty}', '${boxId}')">${m.n} (${m.p})</div>`).join(''); 
    } else box.style.display='none';
}

function pickSug(n, p, s, boxId) {
    if(boxId === 'pop-box') {

    } else {
        cliKw = n; Swal.close(); showP('pg-cli', 1); setTimeout(() => renderCli(), 150);
    }
}

async function togglePay(aptId, tagId, ds) {
    const a = store.appointments.find(x => String(x.id) === String(aptId));
    if(!a) return;
    
    if(!a.payTags) a.payTags = [];
    const idx = a.payTags.indexOf(tagId);
    
    if(idx > -1) {
        a.payTags.splice(idx, 1); // 熄滅
    } else {
        a.payTags.push(tagId); // 點亮
    }
    
    await saveS(); // 等待雲端存檔
    renderDay(ds); // 重新畫卡片
}

// --- 🚀 V318 鋼鐵門禁：區分主副權限通電版 ---
async function checkLicense() {
    const auth = JSON.parse(localStorage.getItem('v318_booking_auth'));
    if (!auth) {
        const { value: res } = await Swal.fire({
            title: '歡迎使用預約系統 V318',
            html: `<p style="font-size:0.9rem; color:#888;">請輸入預約專用金鑰激活系統</p>
                   <input id="sw-key" class="swal2-input" placeholder="輸入授權金鑰">
                   <input id="sw-id" class="swal2-input" placeholder="定義店號 (如: Knife01)">`,
            allowOutsideClick: false,
            preConfirm: () => ({ key: document.getElementById('sw-key').value, id: document.getElementById('sw-id').value })
        });

        if (res && res.key) {
            try {
                const doc = await db.collection("LicenseKeys_Booking").doc(res.key).get();
                if (doc.exists && doc.data().status === "unused") {
                    
                    // 🚀 關鍵：從雲端抓取該金鑰的身分 (若無設定則預設為 staff)
                    const cloudRole = doc.data().role || 'staff';

                    await db.collection("LicenseKeys_Booking").doc(res.key).update({
                        status: "used",
                        salonId: res.id,
                        activatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    // 🚀 關鍵：把身分 (role) 跟著店號一起存進手機
                    const finalAuth = { 
                        key: res.key, 
                        id: res.id, 
                        role: cloudRole 
                    };
                    localStorage.setItem('v318_booking_auth', JSON.stringify(finalAuth));

                    Swal.fire({
                        icon: 'success',
                        title: '激活成功',
                        text: `權限級別：${cloudRole === 'admin' ? '主控店長' : '團隊成員'}`,
                        confirmButtonColor: '#1d1d1f'
                    }).then(() => location.reload());

                } else {
                    Swal.fire('驗證失敗', '金鑰無效或已被佔用', 'error').then(() => checkLicense());
                }
            } catch(e) {
                console.error(e);
                Swal.fire('連線錯誤', '請確認 Firebase 已設定正確', 'error');
            }
        }
    } else {
        // 如果已經激活過，照常抓資料
        pullFromCloud(); 
    }
}

/// 複製功能的鋼鐵大腦 (強效相容版)
function copyKey(text) {
    // 1. 建立一個隱藏的輸入框
    const dummy = document.createElement("input");
    document.body.appendChild(dummy);
    dummy.value = text;
    
    // 2. 選取並執行複製命令
    dummy.select();
    dummy.setSelectionRange(0, 99999); // 支援手機
    
    try {
        const successful = document.execCommand('copy');
        document.body.removeChild(dummy);
        
        if (successful) {
            // 3. 跳出成功的視覺回饋，讓你知道真的「複製成功」了！
            Swal.fire({
                icon: 'success',
                title: '🎉 複製成功！',
                text: '金鑰：' + text + ' 已存入剪貼簿',
                timer: 1500,
                showConfirmButton: false,
                background: '#fff',
                backdrop: `rgba(212, 175, 55, 0.2)` // 淡淡的金光
            });
        }
    } catch (err) {
        document.body.removeChild(dummy);
        Swal.fire('複製失敗', '請手動選取文字複製', 'error');
    }
}

    const payMap = {};      // 支付方式分布
    const sexMap = { 'Mars ♂': 0, 'Venus ♀': 0 };
    const vipMap = { '指定': 0, '不指定': 0 };

    filteredApts.forEach(a => {
        const d = new Date(a.date);
        const price = parseFloat(a.price) || 0;
        
        // 累加營收與週起伏
        totalRevenue += price;
        weekCountMap[d.getDay()] += 1;
        weekMap[d.getDay()] += price; 

        // 統計指定比
        if(a.isVIP) vipMap['指定'] += 1; else vipMap['不指定'] += 1;

        // 統計服務項目熱度 (方案三：從 tags 抓)
        (a.tags || []).forEach(t => {
            tagUsageMap[t] = (tagUsageMap[t] || 0) + 1;
        });

        // --- Aether Flow: 數據自動分流大腦 ---
        // 1. 性別統計：直接抓取系統性別欄位，100% 精準
        if (a.sex === 'M') sexMap['Mars ♂'] += 1;
        else if (a.sex === 'F') sexMap['Venus ♀'] += 1;

        // 2. 支付標籤統計：過濾掉性別關鍵字，只留純支付數據
        (a.payTags || []).forEach(tId => {
            const pt = store.payTagsDef.find(x => x.id === tId);
            if (!pt) return;
            const tName = pt.name;
            
            // 只要標籤名稱包含支付相關字眼，就計入支付分佈圖
            if (/現金|Line|街口|轉帳|刷卡|支付|錢|匯款|Apple|Google/.test(tName)) {
                payMap[tName] = (payMap[tName] || 0) + 1;
            }
        });
    });

// --- 【Aether Flow：互動式多選排休日曆】 ---
async function pickOffMulti() {
    const now = new Date();
    let viewM = now.getMonth() + 1;
    let viewY = now.getFullYear();

    // 渲染互動日曆的工具
    const renderInteractiveCal = () => {
        const daysInM = new Date(viewY, viewM, 0).getDate();
        const startDay = new Date(viewY, viewM - 1, 1).getDay();
        const offset = startDay === 0 ? 6 : startDay - 1; // 調整為週一開始
        
        let html = `
            <div style="margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
                <button onclick="window.changeOffMonth(-1)" class="luxe-btn" style="height:40px; width:40px; padding:0;">＜</button>
                <div style="font-weight:900; font-size:1.2rem;">${viewY} / ${String(viewM).padStart(2,'0')}</div>
                <button onclick="window.changeOffMonth(1)" class="luxe-btn" style="height:40px; width:40px; padding:0;">＞</button>
            </div>
            <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:5px; text-align:center;">
        `;
        
        // 標題
        ['一','二','三','四','五','六','日'].forEach(w => html += `<div style="font-size:0.7rem; font-weight:900; color:#ccc;">${w}</div>`);
        
        // 空白格
        for(let i=0; i<offset; i++) html += `<div></div>`;
        
        // 日期格
        for(let d=1; d<=daysInM; d++) {
            const ds = `${viewY}-${String(viewM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isOff = store.offDays.includes(ds);
            html += `
                <div onclick="window.toggleOffDay('${ds}')" id="cell-${ds}" 
                     style="padding:10px 0; border-radius:12px; cursor:pointer; font-weight:900; transition:0.3s;
                     background:${isOff ? 'var(--gold)' : 'rgba(0,0,0,0.03)'}; 
                     color:${isOff ? '#fff' : 'var(--primary)'};">
                    ${d}
                </div>`;
        }
        html += `</div>`;
        return html;
    };

    // 全域輔助函式，讓彈窗內的按鈕可以作用
    window.toggleOffDay = (ds) => {
        const idx = store.offDays.indexOf(ds);
        if(idx > -1) store.offDays.splice(idx, 1);
        else store.offDays.push(ds);
        const cell = document.getElementById(`cell-${ds}`);
        if(cell) {
            const active = store.offDays.includes(ds);
            cell.style.background = active ? 'var(--gold)' : 'rgba(0,0,0,0.03)';
            cell.style.color = active ? '#fff' : 'var(--primary)';
        }
    };

    window.changeOffMonth = (v) => {
        viewM += v;
        if(viewM > 12) { viewM = 1; viewY++; }
        if(viewM < 1) { viewM = 12; viewY--; }
        document.getElementById('interactive-cal-container').innerHTML = renderInteractiveCal();
    };

    await Swal.fire({
        title: '設定店舖排休',
        html: `<div id="interactive-cal-container" style="padding:10px;">${renderInteractiveCal()}</div>`,
        confirmButtonText: '完成設定',
        confirmButtonColor: 'var(--gold)',
        didClose: () => {
            saveS();     // 關閉視窗時自動存檔
            initMonth(); // 刷新主預約表
        }
    });
}

    if (result.isConfirmed) {
        // 1. 先過濾掉該成員
        store.stylists = store.stylists.filter(s => String(s.id) !== String(id));
        
        // 2. 執行存檔並強制等待 (這步會噴出綠色訊息)
        await saveS(); 
        
        // 3. 關閉抽屜回到設定頁
        popStyDrawer();
        
        // 4. 重新刷一下設定頁面的顯示
        if(typeof renderSet === 'function') renderSet();
    }
}
// --- 【以太流：顧客資料修改引擎】 ---
async function editCli(oldName) {
    // 1. 找到該位顧客的原有資料
    const c = store.clients.find(x => x.n === oldName);
    if (!c) return;

    const { value: res } = await Swal.fire({
        title: '修改顧客資料',
        width: '85%',
        html: `
            <input id="edit-cn" class="luxe-btn" style="width:100%;margin-bottom:15px;border-radius:30px;" value="${c.n}" placeholder="姓名">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <div id="boy-btn-cli" class="gender-btn ${c.sex === 'M' ? 'active-boy' : ''}" onclick="setSexCli('M')">♂ 男</div>
                <div id="girl-btn-cli" class="gender-btn ${c.sex === 'F' ? 'active-girl' : ''}" onclick="setSexCli('F')">♀ 女</div>
            </div>
            <input type="hidden" id="edit-pop-sex" value="${c.sex || 'F'}">
            <input id="edit-cp" class="luxe-btn" style="width:100%;margin-bottom:15px;border-radius:30px;" value="${c.p || ''}" placeholder="電話">
            <select id="edit-cs" class="luxe-btn" style="width:100%;border-radius:30px; margin-bottom:20px;">
                ${store.stylists.map(s => `<option value="${s.id}" ${String(s.id) === String(c.lastSty) ? 'selected' : ''}>${s.name}</option>`).join('')}
            </select>
            <div style="display:flex; gap:5px; justify-content:center; align-items:center;">
                <span style="font-weight:900; color:#888;">🎂 生日：</span>
                <input id="edit-cm" class="shield-input" type="text" value="${c.bm || ''}" placeholder="月"> / 
                <input id="edit-cd" class="shield-input" type="text" value="${c.bd || ''}" placeholder="日">
            </div>
        `,
        preConfirm: () => ({
            n: document.getElementById('edit-cn').value,
            p: document.getElementById('edit-cp').value,
            sex: document.getElementById('edit-pop-sex').value,
            s: document.getElementById('edit-cs').value,
            m: document.getElementById('edit-cm').value,
            d: document.getElementById('edit-cd').value
        })
    });

    if (res && res.n) {
        // 2. 更新資料庫（連同歷史紀錄的名字也要考慮到，這裡先做顧客檔更新）
        c.n = res.n;
        c.p = res.p;
        c.sex = res.sex;
        c.lastSty = res.s;
        c.bm = res.m;
        c.bd = res.d;

        await saveS();   // 同步雲端
        renderCli();     // 立即重新渲染顧客清單
        Swal.fire({ icon: 'success', title: '修改成功', timer: 800, showConfirmButton: false });
    }
}

// 輔助：顧客修改視窗專用的性別切換器
function setSexCli(s) {
    document.getElementById('edit-pop-sex').value = s;
    const b = document.getElementById('boy-btn-cli');
    const g = document.getElementById('girl-btn-cli');
    b.classList.remove('active-boy');
    g.classList.remove('active-girl');
    if(s === 'M') b.classList.add('active-boy');
    if(s === 'F') g.classList.add('active-girl');
}

// --- 🚀 [旗艦補丁] 服務項目新增引擎：保證通電 + 強制同步 ---
// ==========================================================================
async function addTagTrig() { 
    const { value: n } = await Swal.fire({
        title: '新增服務項目', 
        input: 'text',
        inputPlaceholder: '例如：極致奢華護理',
        showCancelButton: true,
        confirmButtonText: '確認新增',
        confirmButtonColor: '#1d1d1f',
        cancelButtonText: '取消',
        reverseButtons: true
    }); 
    
    if (n && n.trim() !== "") {
        // 1. 檢查資料籃子
        if (!store.tags) store.tags = [];
        
        // 2. 塞入新項目
        store.tags.push({ 
            id: Date.now(), 
            name: n.trim() 
        }); 
        
        // 3. 🚀 核心通電：執行存檔並強制噴出綠色同步提示
        await saveS(); 
        
        // 4. 刷新介面
        renderSet(); 
        popTagDrawer(); 
    } else {
        // 如果沒輸入，就直接回抽屜
        popTagDrawer();
    }
}
