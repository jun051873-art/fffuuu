    :root { --primary: #1d1d1f; --gold: #D4AF37; --luxe-border: rgba(212, 175, 55, 0.4); --glass: rgba(255, 255, 255, 0.6); --round-pill: 40px; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    
    /* --- Aether Flow: 物理釘子修正版 --- */
html, body { 
    height: 100%; width: 100%; margin: 0; padding: 0; 
    /* 這裡要保留，防止整片背景彈跳 */
    overflow: hidden !important; 
    position: fixed !important; 
    background: #fff; 
}

/* --- 內容捲軸區：核心解鎖 --- */
.content-scroll {
    /* 必須明確給予高度，否則手機不知道滑動範圍 */
    height: 100vh; 
    flex: 1;
    overflow-y: auto !important; 
    /* 關鍵：開啟 iOS 原生絲滑滾動 */
    -webkit-overflow-scrolling: touch !important; 
    /* 給予底部空間，避開導航條 */
    padding-bottom: 220px !important; 
}

/* --- 顧客頁面比例修正：讓卡片在手機上縮小 --- */
.client-grid-container {
    display: grid;
    /* 修正：將 350px 降到 280px，卡片才不會撐破手機寬度 */
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
    gap: 15px;
    padding: 15px;
}

/* --- 針對小手機的極致壓縮 (自適應) --- */
@media (max-width: 480px) {
    .header { padding: 45px 20px 15px !important; }
    .glow-title { font-size: 1.6rem !important; }
    /* 縮小卡片內文字，防止頁面太大 */
    .cli-luxe-card { padding: 18px !important; border-radius: 25px !important; }
    .cli-luxe-card div[style*="font-size:2rem"] { font-size: 1.5rem !important; }
    
    /* 導航條稍微縮小比例 */
    .nav { height: 75px !important; width: 94% !important; bottom: 20px !important; }
}

    let curD = new Date();
    let tempTags = [];
    let cliKw = "";
    
    // 優先從本機抓取，若無則初始化
    let store = JSON.parse(localStorage.getItem('SALON_LOCK_V318')) || {
        startH: "11:00", endH: "19:00", offColor: "#e5e5ea",
        stylists: [{id: 1, name: 'Tonny', color: '#1d1d1f'}, {id: 2, name: 'Apple', color: '#D4AF37'}],      
        tags: [{id: 1, name: '剪髮'}, {id: 2, name: '洗髮'}], 
        // --- 這是新增的自定義標籤籃子 ---
        payTagsDef: [
            {id: 'L', name: 'Line', color: '#06C755'},
            {id: 'J', name: '街口', color: '#ED1C24'},
            {id: 'C', name: '現金', color: '#8B4513'}
        ],
        appointments: [], clients: [], offDays: []
    };

    // 【重要】鋼鐵核心：必須是 async 才能確保導入成功
    async function saveS() { 
        // 1. 先存本機備份
        localStorage.setItem('SALON_LOCK_V318', JSON.stringify(store)); 

        // 2. 抓取店號並同步到 Firebase
        const auth = JSON.parse(localStorage.getItem('v318_booking_auth'));
        if (auth && auth.id && auth.id !== "未綁定") {
            try {
                // 等待 Firebase 存檔完成
                await db.collection("Salons").doc(auth.id).set(store);
                console.log("雲端同步成功:", auth.id);
                
                // 成功同步後跳出提示 (不干擾操作的 Toast)
                const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1000 });
                Toast.fire({ icon: 'success', title: '雲端已同步' });
            } catch (e) {
                console.error("雲端同步失敗", e);
            }
        }
    }

    // 從雲端抓回資料 (開機用)
    async function pullFromCloud() {
        const auth = JSON.parse(localStorage.getItem('v318_booking_auth'));
        if (!auth || !auth.id) return;
        try {
            const doc = await db.collection("Salons").doc(auth.id).get();
            if (doc.exists) {
                store = doc.data();
                localStorage.setItem('SALON_LOCK_V318', JSON.stringify(store));
                initAll();
            }
        } catch (e) { console.error("抓取雲端資料失敗", e); }
    }

// --- S4: 頁面顯示與分頁切換控制 ---
// ==========================================================================
    function showP(id, index) {
    // 1. 【瞬發反應】：立即移動滑塊，不再等待
    const mover = document.getElementById('nav-aether-mover');
    if(mover && index !== undefined) {
        mover.style.transform = `translateX(${index * 100}%)`;
    }

    // 2. 立即點亮導航圖示 (反應時間從 100ms 降至 0ms)
    document.querySelectorAll('.nav-item').forEach((n, i) => {
        n.classList.toggle('active', i === index);
    });

    // 3. 立即切換分頁，不使用 setTimeout
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const pageEl = document.getElementById(id);
    if(pageEl) {
        pageEl.classList.add('active');
    }

    // 4. 背景安靜載入數據
    if(id.includes('res')) initMonth(); 
    else if(id==='pg-cli') { fillStySelect(); renderCli(); } 
    else if(id==='pg-set') renderSet(); 
    else if(id==='pg-stat') renderStats(); 
    else if(id==='pg-day') renderDay(curD.toLocaleDateString('sv'));

    // 5. 香皂滑動的微震回饋 (物理手感)
    if(window.navigator.vibrate) window.navigator.vibrate(10);
}

    function initMonth() {
        const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
        const pick = document.getElementById('m-picker').value ? new Date(document.getElementById('m-picker').value + "-01") : new Date();
        const year = pick.getFullYear(), month = pick.getMonth(), today = new Date().toLocaleDateString('sv');
        const days = new Date(year, month + 1, 0).getDate();
        let sDay = new Date(year, month, 1).getDay(); sDay = sDay === 0 ? 6 : sDay - 1;
        for(let i=0; i<sDay; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const el = document.createElement('div'); el.className = 'cal-day';
            if(ds === today) el.classList.add('today-highlight');
            if(store.offDays.includes(ds)) el.style.background = store.offColor;
            const dots = [...new Set(store.appointments.filter(a => a.date === ds).map(a => store.stylists.find(st => st.id == a.styId)?.color || '#ddd'))].map(c => `<div style="width:12px;height:12px;border-radius:50%;background:${c};display:inline-block;margin:3px;"></div>`).join('');
            el.innerHTML = `<div>${d}</div><div style="margin-top:10px;">${dots}</div>`;
            el.onclick = () => { curD = new Date(ds); showP('pg-day'); }; grid.appendChild(el);
        }
    }
    function goToday() { curD = new Date(); renderDay(curD.toLocaleDateString('sv')); showP('pg-day'); }
    function shiftDay(v) { curD.setDate(curD.getDate() + v); renderDay(curD.toLocaleDateString('sv')); }

        document.querySelectorAll('.suggest-box').forEach(box => { if (!e.target.closest('input') && !e.target.closest('.suggest-box')) box.style.display = 'none'; });
    });

    function togglePay(id, code, emoji, labelName, ds) {
        const a = store.appointments.find(x => String(x.id) === String(id));
        if(!a) return;
        if(!a.payTags) a.payTags = [];
        const idx = a.payTags.indexOf(code);
        let note = a.note_full || "";
        const tagText = `${emoji}${labelName}`;
        if(idx > -1) { a.payTags.splice(idx, 1); note = note.replace(tagText, "").trim(); } 
        else { a.payTags.push(code); note = (note + " " + tagText).trim(); }
        a.note_full = note; saveS(); renderDay(ds);
    }

    function toggleVIP(id, ds) {
        const a = store.appointments.find(x => String(x.id) === String(id));
        if(!a) return;
        a.isVIP = !a.isVIP;
        saveS(); renderDay(ds);
    }

    async function popNoteEdit(aptId, ds) {
        const a = store.appointments.find(x => String(x.id) === String(aptId));
        if(!a) return;
        const { value: text } = await Swal.fire({ title: '詳細備註', input: 'textarea', inputValue: a.note_full || "", inputPlaceholder: '在此輸入內容...', showCancelButton: true, confirmButtonText: '存檔', cancelButtonText: '取消' });
        if (text !== undefined) { a.note_full = text; saveS(); renderDay(ds); }
    }

/// 複製功能的鋼鐵大腦 (強效相容版)
function copyKey(text) {
    // 1. 建立一個隱藏的輸入框
    const dummy = document.createElement("input");
    document.body.appendChild(dummy);
    dummy.value = text;
    
    // 2. 選取並執行複製命令
    dummy.select();
    dummy.setSelectionRange(0, 99999); // 支援手機
    
    try {
        const successful = document.execCommand('copy');
        document.body.removeChild(dummy);
        
        if (successful) {
            // 3. 跳出成功的視覺回饋，讓你知道真的「複製成功」了！
            Swal.fire({
                icon: 'success',
                title: '🎉 複製成功！',
                text: '金鑰：' + text + ' 已存入剪貼簿',
                timer: 1500,
                showConfirmButton: false,
                background: '#fff',
                backdrop: `rgba(212, 175, 55, 0.2)` // 淡淡的金光
            });
        }
    } catch (err) {
        document.body.removeChild(dummy);
        Swal.fire('複製失敗', '請手動選取文字複製', 'error');
    }
}

// 輔助店員：點擊彈窗裡的標籤會切換發亮
function toggleSwalTag(id, color) {
    window.tmpSelected = window.tmpSelected || [];
    const el = document.getElementById('swal-tag-' + id);
    const idx = window.tmpSelected.indexOf(id);
    if(idx > -1) {
        window.tmpSelected.splice(idx, 1);
        el.style.background = 'transparent';
        el.style.color = color;
    } else {
        window.tmpSelected.push(id);
        el.style.background = color;
        el.style.color = '#fff';
    }
}

// --- 【Aether Flow：互動式多選排休日曆】 ---
async function pickOffMulti() {
    const now = new Date();
    let viewM = now.getMonth() + 1;
    let viewY = now.getFullYear();

    // 渲染互動日曆的工具
    const renderInteractiveCal = () => {
        const daysInM = new Date(viewY, viewM, 0).getDate();
        const startDay = new Date(viewY, viewM - 1, 1).getDay();
        const offset = startDay === 0 ? 6 : startDay - 1; // 調整為週一開始
        
        let html = `
            <div style="margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
                <button onclick="window.changeOffMonth(-1)" class="luxe-btn" style="height:40px; width:40px; padding:0;">＜</button>
                <div style="font-weight:900; font-size:1.2rem;">${viewY} / ${String(viewM).padStart(2,'0')}</div>
                <button onclick="window.changeOffMonth(1)" class="luxe-btn" style="height:40px; width:40px; padding:0;">＞</button>
            </div>
            <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:5px; text-align:center;">
        `;
        
        // 標題
        ['一','二','三','四','五','六','日'].forEach(w => html += `<div style="font-size:0.7rem; font-weight:900; color:#ccc;">${w}</div>`);
        
        // 空白格
        for(let i=0; i<offset; i++) html += `<div></div>`;
        
        // 日期格
        for(let d=1; d<=daysInM; d++) {
            const ds = `${viewY}-${String(viewM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isOff = store.offDays.includes(ds);
            html += `
                <div onclick="window.toggleOffDay('${ds}')" id="cell-${ds}" 
                     style="padding:10px 0; border-radius:12px; cursor:pointer; font-weight:900; transition:0.3s;
                     background:${isOff ? 'var(--gold)' : 'rgba(0,0,0,0.03)'}; 
                     color:${isOff ? '#fff' : 'var(--primary)'};">
                    ${d}
                </div>`;
        }
        html += `</div>`;
        return html;
    };

    // 全域輔助函式，讓彈窗內的按鈕可以作用
    window.toggleOffDay = (ds) => {
        const idx = store.offDays.indexOf(ds);
        if(idx > -1) store.offDays.splice(idx, 1);
        else store.offDays.push(ds);
        const cell = document.getElementById(`cell-${ds}`);
        if(cell) {
            const active = store.offDays.includes(ds);
            cell.style.background = active ? 'var(--gold)' : 'rgba(0,0,0,0.03)';
            cell.style.color = active ? '#fff' : 'var(--primary)';
        }
    };

    window.changeOffMonth = (v) => {
        viewM += v;
        if(viewM > 12) { viewM = 1; viewY++; }
        if(viewM < 1) { viewM = 12; viewY--; }
        document.getElementById('interactive-cal-container').innerHTML = renderInteractiveCal();
    };

    await Swal.fire({
        title: '設定店舖排休',
        html: `<div id="interactive-cal-container" style="padding:10px;">${renderInteractiveCal()}</div>`,
        confirmButtonText: '完成設定',
        confirmButtonColor: 'var(--gold)',
        didClose: () => {
            saveS();     // 關閉視窗時自動存檔
            initMonth(); // 刷新主預約表
        }
    });
}

            n: document.getElementById('edit-cn').value,

function setSexCli(s) {
    document.getElementById('edit-pop-sex').value = s;
    const b = document.getElementById('boy-btn-cli');
    const g = document.getElementById('girl-btn-cli');
    b.classList.remove('active-boy');

    if(s === 'F') g.classList.add('active-girl');
}

// --- 【以太流：物理防禦攔截器 終極解鎖版】 ---
document.body.addEventListener('touchmove', function(e) {
    // 1. 如果摸到的是「姓名建議項目」，絕對不攔截，讓它滑！
    if (e.target.classList.contains('suggest-item') || e.target.closest('.suggest-box')) {
        return; 
    }
    
    // 2. 原本的彈窗與捲軸通行證
    if (e.target.closest('.swal2-container') || e.target.closest('.drawer-content')) {
        return; 
    }
    
    // 3. 跑道與內容區通行證
    if (e.target.closest('.content-scroll') || e.target.closest('.lane-container')) {
        return;
    }
    
    // 只有在摸背景時才鎖死
    if (e.cancelable) e.preventDefault();
}, { passive: false });
