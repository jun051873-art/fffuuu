<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>專屬空間 V318</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="專屬空間">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { --primary: #1d1d1f; --gold: #D4AF37; --luxe-border: rgba(212, 175, 55, 0.4); --glass: rgba(255, 255, 255, 0.6); --round-pill: 40px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow-y: auto; background: #fff; }
        body { font-family: 'Noto Sans TC', sans-serif; color: var(--primary); display: flex; flex-direction: column; }
        .swal2-popup { background: rgba(255, 255, 255, 0.7) !important; backdrop-filter: blur(25px) saturate(180%) !important; border-radius: 45px !important; box-shadow: 0 25px 50px rgba(0,0,0,0.1) !important; }
        .swal2-title { color: #1d1d1f !important; font-weight: 900 !important; }
        .swal2-confirm { background: var(--gold) !important; border-radius: 30px !important; font-weight: 900 !important; padding: 12px 35px !important; }
        .glow-title { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; background: linear-gradient(to right, #1d1d1f 20%, #D4AF37 40%, #D4AF37 60%, #1d1d1f 80%); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 5s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        .fab { position: fixed; bottom: 140px; right: 40px; width: 85px; height: 85px; background: #fff; border: 2.5px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 2.5rem; z-index: 3000; box-shadow: 0 15px 35px rgba(212,175,55,0.25); }
        .luxe-btn { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--luxe-border); border-radius: var(--round-pill); padding: 18px 32px; font-weight: 800; cursor: pointer; color: var(--primary); font-size: 1.2rem; height: 65px; display: inline-flex; align-items: center; justify-content: center; }
        .header { padding: 65px 45px 25px; display: flex; justify-content: space-between; align-items: flex-end; background: rgba(255,255,255,0.85); backdrop-filter: blur(35px); z-index: 1000; border-bottom: 0.5px solid rgba(0,0,0,0.05); }
        .content-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 220px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); margin: 15px 45px; border-radius: 40px; overflow: hidden; background: #f2f2f7; border: 0.3px solid var(--gold); }
        .cal-day { background: #fff; min-height: 135px; padding: 20px; cursor: pointer; border: 0.3px solid rgba(212, 175, 55, 0.15); font-size: 1.5rem; position: relative; }
        .cal-day.today-highlight { background: rgba(212, 175, 55, 0.08) !important; }
        .client-grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 20px; padding: 25px 45px; }
        .suggest-box { position: absolute; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border: 2px solid var(--gold); border-radius: 20px; z-index: 5000; display: none; max-height: 250px; overflow-y: auto; margin-top: 5px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        .suggest-item { padding: 15px 20px; border-bottom: 0.5px solid #eee; font-weight: 900; font-size: 1.2rem; cursor: pointer; color: var(--primary); }
        .lane-container { display: flex; overflow-x: auto; padding: 35px 45px; gap: 30px; flex: 1; align-items: flex-start; }
        .lane { flex: 1; min-width: 380px; display: flex; flex-direction: column; gap: 20px; }
        .time-row-space { min-height: 240px; display: flex; flex-direction: row; gap: 12px; align-items: stretch; }
        .apt-card { padding: 30px; background: #fff; border-radius: 40px; border: 1px solid var(--luxe-border); border-left: 15px solid var(--c); position: relative; flex: 1; display: flex; flex-direction: column; justify-content: space-between; transition: 0.4s; }
        .apt-card.completed { opacity: 0.3 !important; background: #f9f9fb !important; filter: grayscale(1); }
        .nav { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 750px; height: 105px; background: rgba(255,255,255,0.92); backdrop-filter: blur(40px); display: flex; justify-content: space-around; align-items: center; border-radius: 50px; border: 1px solid var(--luxe-border); z-index: 2000; }
        .nav-item { text-align: center; color: #ccc; cursor: pointer; font-size: 1.6rem; }
        .nav-item.active { color: var(--gold); transform: scale(1.1); }
        .page { display: none; width: 100%; height: 100%; }
        .page.active { display: flex; flex-direction: column; }
        .tag-pill { font-size: 0.75rem; font-weight: 800; padding: 4px 12px; border-radius: 12px; background: #f0f0f0; color: #aaa; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        .active-L { background: #06C755 !important; color: #fff !important; border-color: #06C755 !important; }
        .active-J { background: #ED1C24 !important; color: #fff !important; border-color: #ED1C24 !important; }
        .active-C { background: #8B4513 !important; color: #fff !important; border-color: #8B4513 !important; }
        .active-P { background: #007AFF !important; color: #fff !important; border-color: #007AFF !important; }
        .active-S { background: #6f42c1 !important; color: #fff !important; border-color: #6f42c1 !important; }
        .drawer-btn { width: 100%; padding: 20px; background: #f9f9fb; border: 1px solid var(--gold); border-radius: 30px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 900; margin-bottom: 15px; }
        .drawer-content { display: none; padding: 10px; background: #f9f9fb; border-radius: 0 0 30px 30px; border: 1px solid var(--gold); border-top: none; margin-top: -15px; margin-bottom: 15px; text-align: left; }
        .shield-input { border-radius: 15px !important; width: 75px !important; height: 45px !important; text-align: center !important; border: 1.5px solid var(--gold) !important; background: #fff !important; font-weight: 900 !important; font-size: 1.2rem !important; display: inline-block !important; margin: 0 5px !important; }
        .tag-chip { display: inline-block; padding: 15px 28px; border-radius: 30px; border: 1px solid var(--gold); margin: 8px; font-weight: 900; font-size: 1.2rem; cursor: pointer; background: #fff; transition: 0.3s; }
        .tag-chip.selected { background: linear-gradient(135deg, var(--gold), #f3d060); color: #fff; border-color: var(--gold); }
        @media (max-width: 480px) {
            .header { padding: 55px 20px 15px; flex-direction: column; align-items: flex-start; gap: 15px; }
            .header div:last-child { width: 100%; justify-content: space-between; }
            .luxe-btn { height: 50px; padding: 10px 20px; font-size: 1rem; border-radius: 25px; }
            .calendar-grid { margin: 5px 10px; border-radius: 25px; }
            .cal-day { min-height: 85px; font-size: 1rem; padding: 8px; }
            .nav { width: 92%; height: 90px; bottom: 25px; border-radius: 45px; }
            .client-grid-container { grid-template-columns: 1fr; padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="pg-res" class="page active">
        <div class="header">
            <div class="glow-title">專屬空間</div>
            <div style="display:flex; gap:20px; align-items:center;">
                <div class="luxe-btn" onclick="goToday()">今天</div>
                <input type="month" id="m-picker" onchange="initMonth()" class="luxe-btn" style="width: 240px; background:#f2f2f7;">
            </div>
        </div>
        <div class="calendar-header" style="display:grid; grid-template-columns: repeat(7, 1fr); margin: 25px 45px 0; text-align: center; font-size: 1.1rem; font-weight: 900; color: #aaa;">
            <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
        </div>
        <div class="content-scroll"><div id="cal-grid" class="calendar-grid"></div></div>
    </div>

    <div id="pg-day" class="page">
        <div class="header">
            <div style="display:flex; align-items:center; gap:25px;">
                <i class="fas fa-chevron-left luxe-btn" style="border:none;" onclick="showP('pg-res')"></i>
                <i class="fas fa-chevron-left luxe-btn" onclick="shiftDay(-1)"></i>
                <div id="day-title" style="font-weight:900; font-size:2rem;"></div>
                <i class="fas fa-chevron-right luxe-btn" onclick="shiftDay(1)"></i>
            </div>
            <div class="luxe-btn" onclick="goToday()">今天</div>
        </div>
        <div class="lane-container" id="day-lanes"></div>
    </div>

    <div id="pg-cli" class="page">
        <div class="header">
            <div style="font-size: 2.6rem; font-weight: 900; cursor:pointer;" onclick="cliKw=''; renderCli();">顧客</div>
            <div style="display:flex; gap:20px; align-items:center;">
                <div style="position:relative;"><div class="luxe-btn" onclick="popCliSearch()"><i class="fas fa-search"></i></div><div id="cli-sw-box" class="suggest-box" style="width:350px; right:0;"></div></div>
                <select id="cli-f-sty" class="luxe-btn" onchange="renderCli()"></select>
                <div class="luxe-btn" onclick="addCliTrig()" style="font-size:2.2rem; padding:12px 35px;">+</div>
            </div>
        </div>
        <div class="content-scroll"><div class="client-grid-container" id="cli-list"></div></div>
    </div>

    <div id="pg-stat" class="page">
        <div class="header"><div style="font-size: 2.6rem; font-weight: 900;">數據統計</div></div>
        <div class="content-scroll" style="padding:45px;">
            <div style="background:rgba(212,175,55,0.05); border:2px dashed var(--gold); border-radius:40px; padding:60px; text-align:center;">
                <i class="fas fa-chart-pie" style="font-size:4rem; color:var(--gold); margin-bottom:20px;"></i>
                <h2 style="font-weight:900;">客群數據中心已就緒</h2>
                <p>之後將顯示男女比例、時段分析與預約排行</p>
            </div>
        </div>
    </div>

    <div id="pg-set" class="page">
        <div class="header"><div id="admin-trigger" style="font-size: 2.6rem; font-weight: 900; user-select: none;">設定</div></div>
        <div class="content-scroll" style="padding: 0 45px 150px 45px;" id="set-content-container"></div>
    </div>

    <button class="fab" onclick="popBooking()"><i class="fas fa-plus"></i></button>
    <div class="nav">
        <div onclick="showP('pg-res')" id="n-res" class="nav-item active"><i class="fas fa-calendar-alt"></i><br><span style="font-size:0.9rem; font-weight:900;">預約表</span></div>
        <div onclick="showP('pg-cli')" id="n-cli" class="nav-item"><i class="fas fa-user-circle"></i><br><span style="font-size:0.9rem; font-weight:900;">顧客</span></div>
        <div onclick="showP('pg-stat')" id="n-stat" class="nav-item"><i class="fas fa-chart-bar"></i><br><span style="font-size:0.9rem; font-weight:900;">數據</span></div>
        <div onclick="showP('pg-set')" id="n-set" class="nav-item"><i class="fas fa-sliders-h"></i><br><span style="font-size:0.9rem; font-weight:900;">設定</span></div>
    </div>

<script>
// ==========================================================================
// --- S2: Firebase 雲端連接設定 (你的專屬身分證) ---
// ==========================================================================
const firebaseConfig = {
  apiKey: "AIzaSyCMgz-UEFux6v1kcZhuvHaeSxhqxx-9zT4",
  authDomain: "salonsystem-71566.firebaseapp.com",
  projectId: "salonsystem-71566",
  storageBucket: "salonsystem-71566.firebasestorage.app",
  messagingSenderId: "629392896879",
  appId: "1:629392896879:web:88111e1d5416eb104fee9a"
};

// 啟動開關
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==========================================================================
// --- S3: 資料核心與 GAS 雲端同步模組 ---
// ==========================================================================
    let curD = new Date();
    let tempTags = [];
    let cliKw = "";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbybDgSJuk48LPv4lCIFqiAv3vL3XkK1DdObhw6agADIY4J2GqQiW0Zt3IP35hrIbMVT/exec";
    
    let store = JSON.parse(localStorage.getItem('SALON_LOCK_V318')) || {
        startH: "11:00", endH: "19:00", offColor: "#e5e5ea", gSheetUrl: GAS_URL,
        stylists: [{id: 1, name: 'Tonny', color: '#1d1d1f'}, {id: 2, name: 'Apple', color: '#D4AF37'}],      
        tags: [{id: 1, name: '剪髮'}, {id: 2, name: '洗髮'}], appointments: [], clients: [], offDays: []
    };

    async function pullFromGSheet(isManual = false) {
        if(!GAS_URL) return;
        if(isManual) Swal.showLoading(); 
        try {
            const finalUrl = GAS_URL + "?t=" + Date.now();
            const response = await fetch(finalUrl);
            const cloudData = await response.json();
            if (cloudData && (cloudData.appointments || cloudData.stylists)) {
                store = cloudData;
                localStorage.setItem('SALON_LOCK_V318', JSON.stringify(store));
                initAll();
                if(isManual) Swal.fire({ icon: 'success', title: '雲端同步成功', timer: 1000, showConfirmButton: false });
            }
        } catch (e) { console.error("同步失敗", e); }
    }

    function saveS() { localStorage.setItem('SALON_LOCK_V318', JSON.stringify(store)); syncToGSheet(); }
    async function syncToGSheet() { 
        if(!store.gSheetUrl) return;
        try { await fetch(store.gSheetUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(store) }); } catch(e) { console.error("傳送失敗", e); } 
    }

// ==========================================================================
// --- S4: 頁面顯示與分頁切換控制 ---
// ==========================================================================
    function showP(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const targetNavId = 'n-' + id.split('-')[1];
        if(document.getElementById(targetNavId)) document.getElementById(targetNavId).classList.add('active');
        if(id.includes('res')) initMonth(); 
        else if(id==='pg-cli') { fillStySelect(); renderCli(); } 
        else if(id==='pg-set') renderSet(); 
        else if(id==='pg-day') renderDay(curD.toLocaleDateString('sv'));
    }

    function initMonth() {
        const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
        const pick = document.getElementById('m-picker').value ? new Date(document.getElementById('m-picker').value + "-01") : new Date();
        const year = pick.getFullYear(), month = pick.getMonth(), today = new Date().toLocaleDateString('sv');
        const days = new Date(year, month + 1, 0).getDate();
        let sDay = new Date(year, month, 1).getDay(); sDay = sDay === 0 ? 6 : sDay - 1;
        for(let i=0; i<sDay; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const el = document.createElement('div'); el.className = 'cal-day';
            if(ds === today) el.classList.add('today-highlight');
            if(store.offDays.includes(ds)) el.style.background = store.offColor;
            const dots = [...new Set(store.appointments.filter(a => a.date === ds).map(a => store.stylists.find(st => st.id == a.styId)?.color || '#ddd'))].map(c => `<div style="width:12px;height:12px;border-radius:50%;background:${c};display:inline-block;margin:3px;"></div>`).join('');
            el.innerHTML = `<div>${d}</div><div style="margin-top:10px;">${dots}</div>`;
            el.onclick = () => { curD = new Date(ds); showP('pg-day'); }; grid.appendChild(el);
        }
    }
    function goToday() { curD = new Date(); renderDay(curD.toLocaleDateString('sv')); showP('pg-day'); }
    function shiftDay(v) { curD.setDate(curD.getDate() + v); renderDay(curD.toLocaleDateString('sv')); }
    window.addEventListener('click', e => {
        document.querySelectorAll('.suggest-box').forEach(box => { if (!e.target.closest('input') && !e.target.closest('.suggest-box')) box.style.display = 'none'; });
    });

// ==========================================================================
// --- S5: 預約表核心功能 ---
// ==========================================================================
    async function popBooking(n="", p="", sId=null, editId=null) {
        const apt = editId ? store.appointments.find(a => String(a.id) === String(editId)) : null;
        tempTags = apt ? [...(apt.tags || [])] : [];
        const { value: res } = await Swal.fire({
            title: editId ? '修改預約' : '新增預約', width: '85%',
            html: `
                <div style="position:relative; margin-bottom:15px;"><input id="pop-n" class="luxe-btn" style="width:100%; font-size:1.5rem; border-radius:30px;" value="${n}" placeholder="姓名" oninput="searchStored(this, 'pop-box')"><div id="pop-box" class="suggest-box"></div></div>
                <input id="pop-p" class="luxe-btn" style="width:100%; margin-bottom:15px; border-radius:30px;" value="${p}" placeholder="電話號碼">
                <div style="display:flex; gap:10px; margin-bottom:15px; align-items:center;">
                    <select id="pop-s" class="luxe-btn" style="flex:1.5; border-radius:30px;">${store.stylists.map(s=>`<option value="${s.id}" ${String(s.id)===String(sId||1)?'selected':''}>${s.name}</option>`).join('')}</select>
                    <div style="flex:1; display:flex; align-items:center;"><span style="font-weight:900;">人數</span><input id="pop-c" class="shield-input" type="text" value="${apt?apt.c||apt.count:''}" placeholder="手填"></div>
                </div>
                <textarea id="pop-note" class="luxe-btn" style="width:100%; height:80px; border-radius:20px; margin-bottom:15px;" placeholder="備註內容...">${apt?apt.note_full||apt.note:""}</textarea>
                <div class="drawer-btn" onclick="const c=document.getElementById('pop-tg-dr'); c.style.display=c.style.display==='block'?'none':'block';">項目 <i class="fas fa-chevron-down"></i></div>
                <div id="pop-tg-dr" class="drawer-content">${store.tags.map(t=>`<div class="tag-chip ${tempTags.includes(t.name)?'selected':''}" onclick="this.classList.toggle('selected'); const i=tempTags.indexOf('${t.name}'); if(i>-1) tempTags.splice(i,1); else tempTags.push('${t.name}')">${t.name}</div>`).join('')}</div>
                <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin: 15px 0;"><input type="checkbox" id="pop-save-cli" style="width:22px; height:22px; accent-color:var(--gold);" ${editId?'disabled':'checked'}><label for="pop-save-cli" style="font-weight:900; color:var(--gold); font-size:1.1rem;">同步存至顧客名冊</label></div>
                <div style="display:flex; gap:10px;"><input id="pop-d" class="luxe-btn" type="date" style="flex:1.5; border-radius:30px;" value="${apt?apt.date:curD.toLocaleDateString('sv')}"><input id="pop-t" class="luxe-btn" type="time" style="flex:1; border-radius:30px;" value="${apt?apt.time:'12:00'}"></div>`,
            preConfirm: () => ({ n: document.getElementById('pop-n').value, p: document.getElementById('pop-p').value, styId: document.getElementById('pop-s').value, c: document.getElementById('pop-c').value, note: document.getElementById('pop-note').value, d: document.getElementById('pop-d').value, t: document.getElementById('pop-t').value, saveCli: document.getElementById('pop-save-cli').checked })
        });
        if (res && res.n) {
            const data = { id: editId || String(Date.now()), n: res.n, p: res.p, styId: res.styId, c: res.c, note_full: res.note, date: res.d, time: res.t, tags: [...tempTags], done: apt?apt.done:false, payTags: apt?apt.payTags:[] };
            if (editId) store.appointments = store.appointments.map(a => String(a.id) === String(editId) ? data : a);
            else { store.appointments.push(data); if(res.saveCli && !store.clients.find(c => (c.n||c.name) === res.n)) store.clients.push({ n: res.n, p: res.p, lastSty: res.styId, bm: '', bd: '', note: res.note }); }
            saveS(); renderDay(res.d);
            if(document.getElementById('pg-cli').classList.contains('active')) renderCli();
        }
    }

    function togglePay(id, code, emoji, labelName, ds) {
        const a = store.appointments.find(x => String(x.id) === String(id));
        if(!a) return;
        if(!a.payTags) a.payTags = [];
        const idx = a.payTags.indexOf(code);
        let note = a.note_full || "";
        const tagText = `${emoji}${labelName}`;
        if(idx > -1) { a.payTags.splice(idx, 1); note = note.replace(tagText, "").trim(); } 
        else { a.payTags.push(code); note = (note + " " + tagText).trim(); }
        a.note_full = note; saveS(); renderDay(ds);
    }

    function toggleVIP(id, ds) {
        const a = store.appointments.find(x => String(x.id) === String(id));
        if(!a) return;
        a.isVIP = !a.isVIP;
        saveS(); renderDay(ds);
    }

    async function popNoteEdit(aptId, ds) {
        const a = store.appointments.find(x => String(x.id) === String(aptId));
        if(!a) return;
        const { value: text } = await Swal.fire({ title: '詳細備註', input: 'textarea', inputValue: a.note_full || "", inputPlaceholder: '在此輸入內容...', showCancelButton: true, confirmButtonText: '存檔', cancelButtonText: '取消' });
        if (text !== undefined) { a.note_full = text; saveS(); renderDay(ds); }
    }

// ==========================================================================
// --- S6: 跑道渲染與顧客名冊 ---
// ==========================================================================
    function renderDay(ds) {
        const days = ['日','一','二','三','四','五','六'];
        const dayTitleEl = document.getElementById('day-title');
        if(dayTitleEl) dayTitleEl.innerText = `${ds} (週${days[new Date(ds).getDay()]})`; 
        const area = document.getElementById('day-lanes'); 
        if(!area) return;
        area.innerHTML = '';
        const start = parseInt(store.startH || '11'), end = parseInt(store.endH || '19');
        const hours = []; for(let i=start; i<=end; i++) hours.push(`${i}:00`);

    // --- 各項功能的靈魂 (獨立分開，不互相嵌套) ---

    // [功能 A] 重新激活
    function reAuth() {
        Swal.fire({
            title: '確定要重新激活嗎？',
            text: "這將清除本機紀錄，您需要重新輸入金鑰才能進入。",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#D4AF37',
            confirmButtonText: '確定清除',
            cancelButtonText: '取消'
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.removeItem('v318_booking_auth');
                location.reload(); 
            }
        });
    }

    // [功能 B] 導入檔案 (關鍵搬家工具)
    function triggerLoad() {
        const i = document.createElement('input');
        i.type = 'file';
        i.accept = '.json'; 
        i.onchange = e => {
            const file = e.target.files[0];
            const r = new FileReader();
            r.onload = () => {
                try {
                    let d = JSON.parse(r.result);
                    // 相容舊格式轉換
                    if (d.appointments) d.appointments = d.appointments.map(a => ({ ...a, n: a.n || a.name, p: a.p || a.phone, c: a.c || a.count }));
                    if (d.clients) d.clients = d.clients.map(c => ({ ...c, n: c.n || c.name, p: c.p || c.phone }));
                    
                    store = d;
                    saveS(); // 核心：導入完立刻存檔並飛向 Firebase
                    
                    Swal.fire({ icon: 'success', title: '導入成功！', text: '舊資料已同步至雲端', timer: 2000 }).then(() => {
                        location.reload(); 
                    });
                } catch (err) {
                    Swal.fire('格式錯誤', '這不是正確的備份檔案喔！', 'error');
                }
            };
            r.readAsText(file);
        };
        i.click(); 
    }

    // [功能 C] 導出備份
    function exportToFile() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(store)], {type: 'application/json'}));
        a.download = `Salon_Backup_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

async function checkLicense() {
    const auth = JSON.parse(localStorage.getItem('v318_booking_auth'));
    if (!auth) {
        const { value: res } = await Swal.fire({
            title: '歡迎使用預約系統 V318',
            html: `<p style="font-size:0.9rem; color:#888;">請輸入預約專用金鑰激活系統</p>
                   <input id="sw-key" class="swal2-input" placeholder="輸入授權金鑰">
                   <input id="sw-id" class="swal2-input" placeholder="定義店號 (如: Knife01)">`,
            allowOutsideClick: false,
            preConfirm: () => ({ key: document.getElementById('sw-key').value, id: document.getElementById('sw-id').value })
        });

        if (res && res.key) {
            try {
                const doc = await db.collection("LicenseKeys_Booking").doc(res.key).get();
                if (doc.exists && doc.data().status === "unused") {
                    await db.collection("LicenseKeys_Booking").doc(res.key).update({
                        status: "used",
                        salonId: res.id,
                        activatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    localStorage.setItem('v318_booking_auth', JSON.stringify(res));
                    Swal.fire('激活成功', `店號：${res.id}`, 'success').then(() => location.reload());
                } else {
                    Swal.fire('驗證失敗', '金鑰無效或已被佔用', 'error').then(() => checkLicense());
                }
            } catch(e) {
                Swal.fire('連線錯誤', '請確認 Firebase 已設定正確', 'error');
            }
        }
    } else {
        pullFromGSheet();
    }
}

// 支援手機觸控、平板、電腦滑鼠長按 3 秒生成金鑰
let pressTimer;
const adminTrigger = document.getElementById('admin-trigger');

if(adminTrigger) {
    const startPress = (e) => {
        pressTimer = setTimeout(async () => {
            const { value: pw } = await Swal.fire({ 
                title: '管理員驗證', 
                input: 'password', 
                inputPlaceholder: '請輸入管理密碼',
                confirmButtonColor: '#D4AF37'
            });
            if (pw === '518') {
                const newKey = "BOK-" + Math.random().toString(36).substring(2, 10).toUpperCase();
                await db.collection("LicenseKeys_Booking").doc(newKey).set({
                    status: "unused",
                    type: "Booking_V318",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // 這裡加入直覺的「一鍵複製」功能
                Swal.fire({
                    title: '成功生成預約金鑰',
                    html: `
                        <h2 id="copy-target" style="color:var(--gold); font-weight:900; margin: 20px 0;">${newKey}</h2>
                        <button onclick="copyKey('${newKey}')" class="luxe-btn" style="width:100%; height:50px; background:var(--gold); color:#fff; border:none;">
                            <i class="fas fa-copy"></i> 點我直接複製
                        </button>
                    `,
                    showConfirmButton: false
                });
            } else if(pw) {
                Swal.fire('密碼錯誤', '', 'error');
            }
        }, 3000);
    };

    const cancelPress = () => clearTimeout(pressTimer);

    adminTrigger.addEventListener('touchstart', startPress);
    adminTrigger.addEventListener('mousedown', startPress);
    adminTrigger.addEventListener('touchend', cancelPress);
    adminTrigger.addEventListener('mouseup', cancelPress);
    adminTrigger.addEventListener('mouseleave', cancelPress);
}

/// 複製功能的鋼鐵大腦 (強效相容版)
function copyKey(text) {
    // 1. 建立一個隱藏的輸入框
    const dummy = document.createElement("input");
    document.body.appendChild(dummy);
    dummy.value = text;
    
    // 2. 選取並執行複製命令
    dummy.select();
    dummy.setSelectionRange(0, 99999); // 支援手機
    
    try {
        const successful = document.execCommand('copy');
        document.body.removeChild(dummy);
        
        if (successful) {
            // 3. 跳出成功的視覺回饋，讓你知道真的「複製成功」了！
            Swal.fire({
                icon: 'success',
                title: '🎉 複製成功！',
                text: '金鑰：' + text + ' 已存入剪貼簿',
                timer: 1500,
                showConfirmButton: false,
                background: '#fff',
                backdrop: `rgba(212, 175, 55, 0.2)` // 淡淡的金光
            });
        }
    } catch (err) {
        document.body.removeChild(dummy);
        Swal.fire('複製失敗', '請手動選取文字複製', 'error');
    }
}

    if(mPicker) mPicker.value = new Date().toISOString().slice(0,7);
    initAll();
    checkLicense(); 
});
