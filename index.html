<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

    <style>
        :root { --primary: #1d1d1f; --gold: #D4AF37; --luxe-border: rgba(212, 175, 55, 0.4); --glass: rgba(255, 255, 255, 0.6); --round-pill: 40px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow-y: auto; background: #fff; }
        body { font-family: 'Noto Sans TC', sans-serif; color: var(--primary); display: flex; flex-direction: column; }
        .swal2-popup { background: rgba(255, 255, 255, 0.7) !important; backdrop-filter: blur(25px) saturate(180%) !important; border-radius: 45px !important; box-shadow: 0 25px 50px rgba(0,0,0,0.1) !important; }
        .swal2-title { color: #1d1d1f !important; font-weight: 900 !important; }
        .swal2-confirm { background: var(--gold) !important; border-radius: 30px !important; font-weight: 900 !important; padding: 12px 35px !important; }
        .glow-title { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; background: linear-gradient(to right, #1d1d1f 20%, #D4AF37 40%, #D4AF37 60%, #1d1d1f 80%); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 5s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        .fab { position: fixed; bottom: 140px; right: 40px; width: 85px; height: 85px; background: #fff; border: 2.5px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 2.5rem; z-index: 3000; box-shadow: 0 15px 35px rgba(212,175,55,0.25); }
        .luxe-btn { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--luxe-border); border-radius: var(--round-pill); padding: 18px 32px; font-weight: 800; cursor: pointer; color: var(--primary); font-size: 1.2rem; height: 65px; display: inline-flex; align-items: center; justify-content: center; }
        .header { padding: 65px 45px 25px; display: flex; justify-content: space-between; align-items: flex-end; background: rgba(255,255,255,0.85); backdrop-filter: blur(35px); z-index: 1000; border-bottom: 0.5px solid rgba(0,0,0,0.05); }
        .content-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 220px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); margin: 15px 45px; border-radius: 40px; overflow: hidden; background: #f2f2f7; border: 0.3px solid var(--gold); }

        .client-grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 350px), 1fr)); gap: 25px; padding: 25px; }
        .suggest-box { position: absolute; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border: 2px solid var(--gold); border-radius: 20px; z-index: 5000; display: none; max-height: 250px; overflow-y: auto; margin-top: 5px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        .suggest-item { padding: 15px 20px; border-bottom: 0.5px solid #eee; font-weight: 900; font-size: 1.2rem; cursor: pointer; color: var(--primary); }
        .lane-container { display: flex; overflow-x: auto; padding: 35px 45px; gap: 30px; flex: 1; align-items: flex-start; }
        .lane { flex: 1; min-width: 380px; display: flex; flex-direction: column; gap: 20px; }
        .time-row-space { min-height: 240px; display: flex; flex-direction: row; gap: 12px; align-items: stretch; }
        .apt-card { padding: 30px; background: #fff; border-radius: 40px; border: 1px solid var(--luxe-border); border-left: 15px solid var(--c); position: relative; flex: 1; display: flex; flex-direction: column; justify-content: space-between; transition: 0.4s; }
        .apt-card.completed { opacity: 0.3 !important; background: #f9f9fb !important; filter: grayscale(1); }
        /* --- 【Aether Flow 美學語言：導航核心】 --- */
        .nav {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; height: 90px;
            /* 以太外殼：極輕微灰階底座 */
            background: rgba(0, 0, 0, 0.03); 
            border-radius: 45px; display: flex; align-items: center; position: relative;
            padding: 6px; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.03);
            z-index: 5000;
        }

        #nav-aether-mover {
            position: absolute; left: 6px; 
            width: calc(25% - 12px); height: calc(100% - 12px);
            /* 極致剔透的毛玻璃質感 */
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(35px) saturate(210%);
            -webkit-backdrop-filter: blur(35px) saturate(210%);
            border-radius: 40px; z-index: 1;
            /* 物理阻尼曲線：0.6s 溫潤吸附感 */
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            /* 模擬真玻璃的 Rim Light 邊框亮痕 */
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 35px rgba(0,0,0,0.06), inset 0 3px 6px rgba(255,255,255,1), inset 0 -2px 10px rgba(0,0,0,0.02);
        }

            position: relative; height: 100%; display: flex; flex-direction: column;

        .active-L { background: #06C755 !important; color: #fff !important; border-color: #06C755 !important; }
        .active-J { background: #ED1C24 !important; color: #fff !important; border-color: #ED1C24 !important; }

        .active-S { background: #6f42c1 !important; color: #fff !important; border-color: #6f42c1 !important; }
        .drawer-btn { width: 100%; padding: 20px; background: #f9f9fb; border: 1px solid var(--gold); border-radius: 30px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 900; margin-bottom: 15px; }
        .drawer-content { display: none; padding: 10px; background: #f9f9fb; border-radius: 0 0 30px 30px; border: 1px solid var(--gold); border-top: none; margin-top: -15px; margin-bottom: 15px; text-align: left; }
        .shield-input { border-radius: 15px !important; width: 75px !important; height: 45px !important; text-align: center !important; border: 1.5px solid var(--gold) !important; background: #fff !important; font-weight: 900 !important; font-size: 1.2rem !important; display: inline-block !important; margin: 0 5px !important; }
        .tag-chip { display: inline-block; padding: 15px 28px; border-radius: 30px; border: 1px solid var(--gold); margin: 8px; font-weight: 900; font-size: 1.2rem; cursor: pointer; background: #fff; transition: 0.3s; }
        .tag-chip.selected { background: linear-gradient(135deg, var(--gold), #f3d060); color: #fff; border-color: var(--gold); }
        /* --- 【V318 全設備自適應大腦】 --- */
        @media (max-width: 768px) {
            .header { padding: 50px 20px 15px; flex-direction: column; align-items: flex-start; gap: 15px; }
            .header div:last-child { width: 100%; justify-content: space-between; display: flex; }
            .luxe-btn { height: 55px; padding: 10px 20px; font-size: 1rem; border-radius: 25px; }
            .glow-title { font-size: 1.8rem; }
            .calendar-grid { margin: 10px; border-radius: 25px; }
            .cal-day { min-height: 85px; font-size: 1rem; padding: 8px; }

            .cli-luxe-card { padding: 20px; border-radius: 25px; margin-bottom: 15px; }
            .stats-card { padding: 20px; margin: 0 10px 15px 10px; border-radius: 25px; }
            .content-scroll { padding-bottom: 180px; }
            .fab { width: 70px; height: 70px; bottom: 120px; right: 20px; font-size: 2rem; }
        }
    /* --- 【V318 專屬空間：設定頁面奢華改造樣式】 --- */
        .set-drawer-trigger {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 20px; padding: 25px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between;

        }

            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.1);
        }
        .set-drawer-trigger i { font-size: 1.8rem; color: #ccc; transition: color 0.3s; }
        .set-drawer-trigger:hover i { color: var(--gold); }
        .add-luxe-btn {
            width: 100%; height: 60px; background: transparent; border: 2px dashed rgba(212, 175, 55, 0.4);
            color: var(--gold); border-radius: 15px; font-weight: 900; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: all 0.2s;
        }
        .add-luxe-btn:hover { background: rgba(212, 175, 55, 0.05); border-color: var(--gold); border-style: solid; }
        .luxe-trash-btn { color: #ccc !important; cursor: pointer; font-size: 1.2rem; transition: all 0.2s; padding: 5px; }
        .luxe-trash-btn:hover { color: #ffcccc !important; transform: scale(1.2); }
        .luxe-edit-icon { color: #ccc; font-size: 1.2rem; transition: color 0.2s; margin-right: 15px; cursor: pointer; }
        .luxe-edit-icon:hover { color: var(--gold); }
        /* --- 【V318 顧客頁面奢華樣式】 --- */
        .cli-luxe-card {
            background: #fff; border-radius: 35px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            padding: 30px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }
        .cli-luxe-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(212,175,55,0.1); }
        .cli-tag-pill {
            background: rgba(212,175,55,0.08); color: var(--gold);
            padding: 6px 15px; border-radius: 12px;
            font-weight: 900; font-size: 0.9rem;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .cli-history-box {
            background: #f9f9fb; border-radius: 20px;
            padding: 20px; margin-top: 15px; border: 1px solid #f0f0f0;
        }
       /* --- 【V318 數據儀表板：旗艦大比例版】 --- */
        .stats-card {
            background: #fff; border-radius: 40px;
            padding: 35px; margin-bottom: 30px;
            border: 1.5px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 15px 45px rgba(0,0,0,0.04);

        .stats-bar-container {

            flex: 1; background: #f2f2f7; border-radius: 12px 12px 6px 6px;

        }
        .stats-bar-fill {

            position: absolute; top: -35px; width: 100%; text-align: center;
            font-weight: 900; color: var(--gold); font-size: 1.1rem;
        }
        .stats-label { font-size: 1rem; color: #888; text-align: center; margin-top: 15px; font-weight: 900; }
        .month-selector {
            width: 100%; background: #f2f2f7; border: none; border-radius: 20px;
            padding: 15px 25px; font-weight: 900; font-size: 1.2rem; color: var(--primary);
            margin-bottom: 30px; appearance: none; text-align: center;
        }
   /* --- 【V318 開單頁面性別切換鈕】 --- */
        .gender-btn {
            flex: 1; height: 50px; border-radius: 20px;
            border: 2px solid #f2f2f7; background: #f2f2f7;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #ccc; cursor: pointer; transition: 0.3s;
        }
        .gender-btn.active-boy { background: #fff; border-color: #007AFF; color: #007AFF; box-shadow: 0 4px 10px rgba(0,122,255,0.1); }
        .gender-btn.active-girl { background: #fff; border-color: #FF2D55; color: #FF2D55; box-shadow: 0 4px 10px rgba(255,45,85,0.1); }

   </style>
</head>
<body>

    <div id="pg-res" class="page active">
        <div class="header">
            <div class="glow-title" id="main-store-name" style="cursor:pointer;" onclick="popRenameStore()">載入中...</div>

                <div class="luxe-btn" onclick="goToday()">今天</div>

            </div>
        </div>
        <div class="calendar-header" style="display:grid; grid-template-columns: repeat(7, 1fr); margin: 25px 45px 0; text-align: center; font-size: 1.1rem; font-weight: 900; color: #aaa;">
            <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
        </div>
        <div class="content-scroll"><div id="cal-grid" class="calendar-grid"></div></div>
    </div>

    <div id="pg-day" class="page">
        <div class="header">
            <div style="display:flex; align-items:center; gap:25px;">
                <i class="fas fa-chevron-left luxe-btn" style="border:none;" onclick="showP('pg-res')"></i>
                <i class="fas fa-chevron-left luxe-btn" onclick="shiftDay(-1)"></i>

       <div class="header">

                <div class="luxe-btn" onclick="popCliSearch()"><i class="fas fa-search"></i></div>
                <select id="cli-f-sty" class="luxe-btn" onchange="renderCli()" style="width:180px;"></select>
                <div class="luxe-btn" onclick="addCliTrig()" style="font-size:1.8rem; padding:12px 30px;"><i class="fas fa-user-plus"></i></div>

        </div>

    <div id="pg-stat" class="page">
        <div class="header"><div style="font-size: 2.6rem; font-weight: 900;">數據統計</div></div>
        <div class="content-scroll" style="padding:45px;">
            <div style="background:rgba(212,175,55,0.05); border:2px dashed var(--gold); border-radius:40px; padding:60px; text-align:center;">
                <i class="fas fa-chart-pie" style="font-size:4rem; color:var(--gold); margin-bottom:20px;"></i>
                <h2 style="font-weight:900;">客群數據中心已就緒</h2>

    <div id="pg-set" class="page">
        <div class="header"><div id="admin-trigger" style="font-size: 2.6rem; font-weight: 900; user-select: none;">設定</div></div>
        <div class="content-scroll" style="padding: 0 45px 150px 45px;" id="set-content-container"></div>
    </div>

    <button class="fab" onclick="popBooking()"><i class="fas fa-plus"></i></button>
   <div class="nav">
        <div id="nav-aether-mover"></div>

        <div onclick="showP('pg-res', 0)" id="n-res" class="nav-item active">
            <i class="fas fa-calendar-alt"></i><span>預約表</span>
        </div>
        <div onclick="showP('pg-cli', 1)" id="n-cli" class="nav-item">
            <i class="fas fa-user-circle"></i><span>顧客</span>
        </div>
        <div onclick="showP('pg-stat', 2)" id="n-stat" class="nav-item">
            <i class="fas fa-chart-bar"></i><span>數據</span>
        </div>
        <div onclick="showP('pg-set', 3)" id="n-set" class="nav-item">
            <i class="fas fa-sliders-h"></i><span>設定</span>
        </div>

<script>
// ==========================================================================
// --- S2: Firebase 雲端連接設定 (你的專屬身分證) ---
// ==========================================================================
const firebaseConfig = {
  apiKey: "AIzaSyCMgz-UEFux6v1kcZhuvHaeSxhqxx-9zT4",
  authDomain: "salonsystem-71566.firebaseapp.com",
  projectId: "salonsystem-71566",
  storageBucket: "salonsystem-71566.firebasestorage.app",
  messagingSenderId: "629392896879",
  appId: "1:629392896879:web:88111e1d5416eb104fee9a"
};

// 啟動開關
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==========================================================================
// --- S3: 資料核心與 Firebase 雲端同步模組 ---
// ==========================================================================
    let curD = new Date();
    let tempTags = [];
    let cliKw = "";
    
    // 優先從本機抓取，若無則初始化
    let store = JSON.parse(localStorage.getItem('SALON_LOCK_V318')) || {
        startH: "11:00", endH: "19:00", offColor: "#e5e5ea",
        stylists: [{id: 1, name: 'Tonny', color: '#1d1d1f'}, {id: 2, name: 'Apple', color: '#D4AF37'}],      
        tags: [{id: 1, name: '剪髮'}, {id: 2, name: '洗髮'}], 
        // --- 這是新增的自定義標籤籃子 ---
        payTagsDef: [
            {id: 'L', name: 'Line', color: '#06C755'},
            {id: 'J', name: '街口', color: '#ED1C24'},
            {id: 'C', name: '現金', color: '#8B4513'}
        ],
        appointments: [], clients: [], offDays: []
    };

    // 【重要】鋼鐵核心：必須是 async 才能確保導入成功
    async function saveS() { 
        // 1. 先存本機備份
        localStorage.setItem('SALON_LOCK_V318', JSON.stringify(store)); 

        // 2. 抓取店號並同步到 Firebase
        const auth = JSON.parse(localStorage.getItem('v318_booking_auth'));
        if (auth && auth.id && auth.id !== "未綁定") {
            try {
                // 等待 Firebase 存檔完成
                await db.collection("Salons").doc(auth.id).set(store);
                console.log("雲端同步成功:", auth.id);
                
                // 成功同步後跳出提示 (不干擾操作的 Toast)
                const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1000 });
                Toast.fire({ icon: 'success', title: '雲端已同步' });
            } catch (e) {
                console.error("雲端同步失敗", e);
            }
        }
    }

    // 從雲端抓回資料 (開機用)
    async function pullFromCloud() {
        const auth = JSON.parse(localStorage.getItem('v318_booking_auth'));
        if (!auth || !auth.id) return;
        try {
            const doc = await db.collection("Salons").doc(auth.id).get();
            if (doc.exists) {
                store = doc.data();
                localStorage.setItem('SALON_LOCK_V318', JSON.stringify(store));
                initAll();
            }
        } catch (e) { console.error("抓取雲端資料失敗", e); }
    }
// ==========================================================================
// --- S4: 頁面顯示與分頁切換控制 ---
// ==========================================================================
    function showP(id, index) {
    // 1. 執行原有的頁面切換邏輯
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    const pageEl = document.getElementById(id);
    if(pageEl) pageEl.classList.add('active');
    
    // 2. 獲取當前導航項並高亮
    const targetNavId = 'n-' + id.split('-')[1];
    const targetNav = document.getElementById(targetNavId);
    if(targetNav) targetNav.classList.add('active');

    // 3. 【Aether Flow 核心指揮】：移動毛玻璃滑塊

    function initMonth() {
        const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
        const pick = document.getElementById('m-picker').value ? new Date(document.getElementById('m-picker').value + "-01") : new Date();
        const year = pick.getFullYear(), month = pick.getMonth(), today = new Date().toLocaleDateString('sv');
        const days = new Date(year, month + 1, 0).getDate();
        let sDay = new Date(year, month, 1).getDay(); sDay = sDay === 0 ? 6 : sDay - 1;
        for(let i=0; i<sDay; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const el = document.createElement('div'); el.className = 'cal-day';
            if(ds === today) el.classList.add('today-highlight');
            if(store.offDays.includes(ds)) el.style.background = store.offColor;
            const dots = [...new Set(store.appointments.filter(a => a.date === ds).map(a => store.stylists.find(st => st.id == a.styId)?.color || '#ddd'))].map(c => `<div style="width:12px;height:12px;border-radius:50%;background:${c};display:inline-block;margin:3px;"></div>`).join('');
            el.innerHTML = `<div>${d}</div><div style="margin-top:10px;">${dots}</div>`;
            el.onclick = () => { curD = new Date(ds); showP('pg-day'); }; grid.appendChild(el);
        }
    }
    function goToday() { curD = new Date(); renderDay(curD.toLocaleDateString('sv')); showP('pg-day'); }
    function shiftDay(v) { curD.setDate(curD.getDate() + v); renderDay(curD.toLocaleDateString('sv')); }
    window.addEventListener('click', e => {
        document.querySelectorAll('.suggest-box').forEach(box => { if (!e.target.closest('input') && !e.target.closest('.suggest-box')) box.style.display = 'none'; });
    });

    function togglePay(id, code, emoji, labelName, ds) {
        const a = store.appointments.find(x => String(x.id) === String(id));
        if(!a) return;
        if(!a.payTags) a.payTags = [];
        const idx = a.payTags.indexOf(code);
        let note = a.note_full || "";
        const tagText = `${emoji}${labelName}`;
        if(idx > -1) { a.payTags.splice(idx, 1); note = note.replace(tagText, "").trim(); } 
        else { a.payTags.push(code); note = (note + " " + tagText).trim(); }
        a.note_full = note; saveS(); renderDay(ds);
    }

    function toggleVIP(id, ds) {
        const a = store.appointments.find(x => String(x.id) === String(id));
        if(!a) return;
        a.isVIP = !a.isVIP;
        saveS(); renderDay(ds);
    }

async function checkLicense() {
    const auth = JSON.parse(localStorage.getItem('v318_booking_auth'));
    if (!auth) {
        const { value: res } = await Swal.fire({
            title: '歡迎使用預約系統 V318',

            allowOutsideClick: false,
            preConfirm: () => ({ key: document.getElementById('sw-key').value, id: document.getElementById('sw-id').value })
        });

        if (res && res.key) {
            try {
                const doc = await db.collection("LicenseKeys_Booking").doc(res.key).get();

                    await db.collection("LicenseKeys_Booking").doc(res.key).update({
                        status: "used",
                        salonId: res.id,
                        activatedAt: firebase.firestore.FieldValue.serverTimestamp()

                Swal.fire('連線錯誤', '請確認 Firebase 已設定正確', 'error');
            }
        }

/// 複製功能的鋼鐵大腦 (強效相容版)
function copyKey(text) {
    // 1. 建立一個隱藏的輸入框
    const dummy = document.createElement("input");
    document.body.appendChild(dummy);
    dummy.value = text;
    
    // 2. 選取並執行複製命令
    dummy.select();
    dummy.setSelectionRange(0, 99999); // 支援手機
    
    try {
        const successful = document.execCommand('copy');
        document.body.removeChild(dummy);
        
        if (successful) {
            // 3. 跳出成功的視覺回饋，讓你知道真的「複製成功」了！
            Swal.fire({
                icon: 'success',
                title: '🎉 複製成功！',
                text: '金鑰：' + text + ' 已存入剪貼簿',
                timer: 1500,
                showConfirmButton: false,
                background: '#fff',
                backdrop: `rgba(212, 175, 55, 0.2)` // 淡淡的金光
            });
        }
    } catch (err) {
        document.body.removeChild(dummy);
        Swal.fire('複製失敗', '請手動選取文字複製', 'error');
    }
}

    filteredApts.forEach(a => {
        // 統計週客次
        const d = new Date(a.date);
        weekMap[d.getDay()] += 1;
        
        // 統計標籤 (自動分流邏輯)
        (a.payTags || []).forEach(tId => {
            const tName = (store.payTagsDef.find(x=>x.id===tId)||{}).name || "未知";
            
            // 判斷是否為支付類 (包含錢、支付、或具體支付工具名)
            const isPay = /現金|Line|街口|轉帳|刷卡|支付|錢|匯款/.test(tName);
            
            if(isPay) {
                payStats[tName] = (payStats[tName] || 0) + 1;
            } else {
                // 這裡會包含：男、女、指定、不指定、新客、舊客等
                guestStats[tName] = (guestStats[tName] || 0) + 1;
            }
        });
    });

    const maxVal = Math.max(...Object.values(weekMap), 1);
    const weekLabels = ['一','二','三','四','五','六','日'];
    const weekKeys = [1, 2, 3, 4, 5, 6, 0];
    const mName = statsMonth.split('-')[1];

    // 內部進度條組件：增加排序，讓「指定/不指定」或「男/女」這種高頻詞排前面
    const renderPills = (dataObj) => {
        return Object.entries(dataObj)
            .sort((a, b) => b[1] - a[1]) // 按次數由高到低排
            .map(([name, count]) => `
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px;">
                <div style="width:90px; font-size:1rem; font-weight:900; color:#555; white-space:nowrap;">${name}</div>
                <div style="flex:1; height:10px; background:#f2f2f7; border-radius:10px; overflow:hidden;">
                    <div style="width:${(count/filteredApts.length)*100}%; height:100%; background:var(--gold); border-radius:10px;"></div>
                </div>
                <div style="font-size:1.1rem; font-weight:900; color:var(--gold); min-width:45px; text-align:right;">${count}</div>
            </div>
        `).join('');
    };

    area.innerHTML = `
        <div style="padding:40px 25px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <p style="font-weight:900; color:#888; letter-spacing:1px; margin:0;"># 經營數據儀表板</p>
                <div style="background:var(--gold); color:#fff; padding:8px 20px; border-radius:20px; font-weight:900; font-size:1rem; box-shadow:0 10px 20px rgba(212,175,55,0.2);">
                   ${mName}月總成交：${filteredApts.length} 
                </div>
            </div>
            
            <input type="month" class="month-selector" value="${statsMonth}" onchange="statsMonth=this.value; renderStats();">

            <div class="stats-card">
                <div style="font-weight:900; font-size:1.3rem; margin-bottom:45px;">
                    <i class="fas fa-chart-line" style="color:var(--gold); margin-right:12px;"></i>每週平均起伏
                </div>
                <div class="stats-bar-container" style="display:flex; align-items:flex-end; gap:12px; height:180px; padding:40px 0 10px 0;">
                    ${weekKeys.map((k, i) => {
                        const val = weekMap[k];
                        const hPercent = (val / maxVal) * 100;
                        return `
                        <div style="flex:1; display:flex; flex-direction:column; align-items:center; height:100%; position:relative;">
                            <div style="width:100%; flex:1; background:#f2f2f7; border-radius:15px; position:relative;">
                                <div style="position:absolute; bottom:0; width:100%; height:${hPercent}%; 
                                            background:linear-gradient(to top, var(--gold), #f9e39d); 
                                            border-radius:15px; transition: height 1s;">
                                    ${val > 0 ? `<div style="position:absolute; top:-35px; width:100%; text-align:center; font-weight:900; color:var(--gold); font-size:1.1rem;">${val}</div>` : ''}
                                </div>
                            </div>
                            <div style="margin-top:15px; font-weight:900; color:#888; font-size:1.1rem;">${weekLabels[i]}</div>
                        </div>`;
                    }).join('')}
                </div>
            </div>

            <div class="stats-card">
                <div style="font-weight:900; font-size:1.3rem; margin-bottom:30px;">
                    <i class="fas fa-wallet" style="color:var(--gold); margin-right:12px;"></i>支付方式分佈
                </div>
                <div style="display:flex; flex-direction:column;">
                    ${renderPills(payStats) || '<div style="color:#ccc; font-weight:700;">尚無支付數據</div>'}
                </div>
            </div>

            <div class="stats-card">
                <div style="font-weight:900; font-size:1.3rem; margin-bottom:30px;">
                    <i class="fas fa-user-check" style="color:var(--gold); margin-right:12px;"></i>客群與指定佔比
                </div>
                <div style="display:flex; flex-direction:column;">
                    ${renderPills(guestStats) || '<div style="color:#ccc; font-weight:700;">尚無分類數據</div>'}
                </div>
            </div>
        </div>
    `;
}
// --- 中文標籤：標籤管理工具函式 (讓新增/修改標籤按鈕通電) ---
async function addPayTag() {
    const {value: n} = await Swal.fire({ title: '新增標籤名稱', input: 'text', inputPlaceholder: '例如：信用卡' });
    if(n) { 
        if(!store.payTagsDef) store.payTagsDef = [];
        store.payTagsDef.push({ id: 'PT'+Date.now(), name: n, color: '#D4AF37' }); 
        await saveS(); renderSet(); 
    }
}

async function editPayTag(id, old) {
    const {value: n} = await Swal.fire({ title: '修改標籤名稱', input: 'text', inputValue: old });
    if(n) { store.payTagsDef.find(x => x.id === id).name = n; await saveS(); renderSet(); }
}

function delPayTag(id) {
    Swal.fire({ title: '確定刪除標籤？', icon: 'warning', showCancelButton: true }).then(async (res) => {
        if(res.isConfirmed) {
            store.payTagsDef = store.payTagsDef.filter(x => x.id !== id);
            await saveS(); renderSet();
        }
    });
}

async function pickTagColor(id) {
    const pt = store.payTagsDef.find(x => x.id === id);
    const { value: res } = await Swal.fire({ title: '選擇標籤顏色', html: `<input type="color" id="sw-c" value="${pt.color}" style="width:150px; height:150px;">`, preConfirm: () => document.getElementById('sw-c').value });
    if (res) { pt.color = res; await saveS(); renderSet(); }
}

// --- 【中文導航：標籤選取彈窗大腦 - 支援動態同步、統計紀錄】 ---
async function popTagPicker(aptId, ds) {
    const a = store.appointments.find(x => String(x.id) === String(aptId));
    if(!a) return;
    if(!a.payTags) a.payTags = [];

    const { value: selectedIds } = await Swal.fire({
        title: '標記支付狀態',
        html: `
            <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; padding:20px;">
                ${(store.payTagsDef || []).map(pt => `
                    <div class="tag-chip-item ${a.payTags.includes(pt.id) ? 'selected' : ''}" 
                         id="swal-tag-${pt.id}"
                         style="border:2px solid ${pt.color}; color:${a.payTags.includes(pt.id) ? '#fff' : pt.color}; background:${a.payTags.includes(pt.id) ? pt.color : 'transparent'}; padding:12px 20px; border-radius:25px; font-weight:900; cursor:pointer; transition: 0.2s;"
                         onclick="toggleSwalTag('${pt.id}', '${pt.color}')">
                        ${pt.name}
                    </div>
                `).join('')}
            </div>
        `,
        didOpen: () => { window.tmpSelected = [...a.payTags]; },
        showCancelButton: true,
        confirmButtonText: '確認存檔',
        confirmButtonColor: '#D4AF37',
        preConfirm: () => window.tmpSelected
    });

    if (selectedIds) {
        a.payTags = selectedIds;
        await saveS();    // 同步到雲端
        renderDay(ds);    // 重新畫出變色後的卡片
    }
}

// 輔助店員：點擊彈窗裡的標籤會切換發亮
function toggleSwalTag(id, color) {
    window.tmpSelected = window.tmpSelected || [];
    const el = document.getElementById('swal-tag-' + id);
    const idx = window.tmpSelected.indexOf(id);
    if(idx > -1) {
        window.tmpSelected.splice(idx, 1);
        el.style.background = 'transparent';
        el.style.color = color;
    } else {
        window.tmpSelected.push(id);
        el.style.background = color;
        el.style.color = '#fff';
    }
}

</script>
